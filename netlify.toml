[build]
  command = "npm run build"
  publish = "dist"

# Прокси на сокращатель ссылок — должен идти ДО SPA-редиректа.
# Сюда попадает только ?d=… (зашифрованные данные); ключ во #fragment
# браузер на сервер не отправляет.
[[redirects]]
  from = "/api/shorten"
  to = "https://is.gd/create.php"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
