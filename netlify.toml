[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

# Сокращатель ссылок — собственные функции (см. netlify/functions):
#   /api/shorten — сохраняет зашифрованные данные, отдаёт /s/<slug>
#   /s/<slug>   — 301 на /?d=<данные>; ключ во #fragment не покидает браузер
# Маршруты функций имеют приоритет над SPA-редиректом ниже.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
